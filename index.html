<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Landscape 2026 — NVIDIA Edition</title>
<style>
  :root {
    --bg:#ffffff; --bg2:#f7f7f5; --bg3:#f1efea;
    --text:#1a1a18; --text2:#5f5e5a; --text3:#888780;
    --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.16);
    --accent:#378add; --accent-bg:#e6f1fb; --accent-text:#0c447c;
    --green-bg:#e1f5ee; --green-text:#0f6e56; --green-dot:#1d9e75;
  }
  @media (prefers-color-scheme:dark) {
    :root {
      --bg:#1a1a18; --bg2:#222220; --bg3:#2c2c2a;
      --text:#e8e6e0; --text2:#b4b2a9; --text3:#5f5e5a;
      --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.16);
      --accent-bg:#042c53; --accent-text:#85b7eb;
      --green-bg:#04342c; --green-text:#9fe1cb; --green-dot:#1d9e75;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px}

  header{padding:1.75rem 1.5rem 1rem;border-bottom:.5px solid var(--border)}
  header h1{font-size:21px;font-weight:500;margin-bottom:3px}
  header p{font-size:12.5px;color:var(--text2)}

  .controls{padding:.85rem 1.5rem;display:flex;flex-direction:column;gap:9px;position:sticky;top:0;background:var(--bg);border-bottom:.5px solid var(--border);z-index:10}
  .search-row input{width:100%;padding:7px 12px;border:.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);font-size:13px;outline:none;transition:border-color .12s}
  .search-row input:focus{border-color:var(--accent)}
  .search-row input::placeholder{color:var(--text3)}
  .filters{display:flex;gap:4px;flex-wrap:wrap}
  .filter-btn{font-size:11px;padding:3px 9px;border:.5px solid var(--border2);border-radius:12px;background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .12s;line-height:1.5}
  .filter-btn:hover{border-color:var(--accent);color:var(--accent)}
  .filter-btn.active{background:var(--accent-bg);color:var(--accent-text);border-color:transparent}

  .stats{padding:6px 1.5rem;font-size:11px;color:var(--text3);border-bottom:.5px solid var(--border);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .hot-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:3px;vertical-align:middle}

  .main{padding:1rem 1.5rem 3rem}
  .section{margin-bottom:1.5rem}
  .section-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;padding-bottom:5px;border-bottom:.5px solid var(--border)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:5px}

  .card{background:var(--bg);border:.5px solid var(--border);border-radius:8px;padding:9px 11px 8px;cursor:pointer;transition:border-color .12s,box-shadow .12s;position:relative;user-select:none}
  .card:hover{border-color:var(--accent);box-shadow:0 0 0 2.5px rgba(55,138,221,0.1)}
  .card.hot{border-left:2px solid var(--accent)}
  .card.expanded{border-color:var(--accent);box-shadow:0 0 0 2.5px rgba(55,138,221,0.1)}

  .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
  .card-name{font-size:12.5px;font-weight:500;color:var(--text);line-height:1.2;margin-bottom:1px}
  .card-maker{font-size:11px;color:var(--text3);margin-bottom:4px}
  .card-desc{font-size:11px;color:var(--text2);line-height:1.35;margin-bottom:5px}
  .card-tags{display:flex;flex-wrap:wrap;gap:3px}
  .chevron{font-size:11px;color:var(--text3);flex-shrink:0;margin-top:1px;transition:transform .18s}
  .card.expanded .chevron{transform:rotate(180deg)}

  /* Expand panel */
  .card-expand{display:none;margin-top:9px;padding-top:9px;border-top:.5px solid var(--border)}
  .card.expanded .card-expand{display:block}

  .nvidia-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;background:var(--green-bg);color:var(--green-text);margin-bottom:8px}
  .nvidia-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--green-dot);flex-shrink:0}

  .expand-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px}
  .expand-summary{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px}
  .expand-bestfor{font-size:12px;color:var(--text2);line-height:1.55}
  .expand-bestfor ul{padding-left:14px;margin-top:3px}
  .expand-bestfor li{margin-bottom:4px}
  .expand-bestfor li strong{color:var(--text);font-weight:500}

  /* Tags */
  .tag{font-size:10px;padding:1px 6px;border-radius:8px;line-height:1.6;white-space:nowrap}
  .tag-frontier,.tag-reason{background:#faece7;color:#993c1d}
  .tag-open,.tag-data,.tag-nc{background:#eaf3de;color:#3b6d11}
  .tag-image,.tag-agent,.tag-mkt{background:#fbeaf0;color:#993556}
  .tag-video,.tag-edge,.tag-auto{background:#faeeda;color:#854f0b}
  .tag-audio,.tag-meet,.tag-world,.tag-arch{background:#eeedfe;color:#534ab7}
  .tag-code,.tag-hw,.tag-acq,.tag-agg{background:#f1efe8;color:#5f5e5a}
  .tag-multi,.tag-sov{background:#e1f5ee;color:#0f6e56}
  .tag-ent,.tag-inf{background:#e6f1fb;color:#0c447c}

  @media(prefers-color-scheme:dark){
    .tag-frontier,.tag-reason{background:#4a1b0c;color:#f5c4b3}
    .tag-open,.tag-data,.tag-nc{background:#173404;color:#c0dd97}
    .tag-image,.tag-agent,.tag-mkt{background:#4b1528;color:#f4c0d1}
    .tag-video,.tag-edge,.tag-auto{background:#412402;color:#fac775}
    .tag-audio,.tag-meet,.tag-world,.tag-arch{background:#26215c;color:#cecbf6}
    .tag-code,.tag-hw,.tag-acq,.tag-agg{background:#2c2c2a;color:#d3d1c7}
    .tag-multi,.tag-sov{background:#085041;color:#9fe1cb}
    .tag-ent,.tag-inf{background:#042c53;color:#b5d4f4}
  }

  .empty{text-align:center;padding:3rem;color:var(--text3)}
  footer{padding:1.25rem 1.5rem;border-top:.5px solid var(--border);font-size:11px;color:var(--text3);text-align:center}

  @media(max-width:600px){
    .grid{grid-template-columns:1fr 1fr}
    header,.controls,.main,.stats{padding-left:1rem;padding-right:1rem}
  }
</style>
</head>
<body>

<header>
  <h1>AI Landscape 2026</h1>
  <p>Complete directory of AI models, tools, labs &amp; companies — click any tile for an NVIDIA-focused summary</p>
</header>

<div class="controls">
  <div class="search-row">
    <input type="text" id="search" placeholder="Search by name, maker, or description…" oninput="render()"/>
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="stats" id="stats"></div>
<div class="main" id="main"></div>

<footer>
  331 AI models, tools &amp; companies · Updated June 2026 · Click any tile to expand an NVIDIA-focused summary
</footer>

<script>
const DATA = [{"name":"GPT-5.5 / GPT-5","maker":"OpenAI","section":"OpenAI","description":"Flagship unified routing system — multimodal + reasoning","tags":"frontier|multi|reason","hot":"true","summary":"GPT-5 is OpenAI's most capable AI assistant — you type a question or task in plain English and it responds with detailed answers, writes code, analyzes documents, or holds a back-and-forth conversation. It can understand text, images, and audio all at once, and its reasoning version works through complex problems step by step before giving an answer.","bestFor":"[AI Researcher] Draft and iterate on research paper sections, literature reviews, and experiment write-ups in minutes rather than hours. | [Software Developer] Describe a bug or feature in plain English and get working code suggestions, explanations, or refactors across any language. | [Product Manager] Generate product requirement documents, competitive analyses, and user story drafts from a few bullet points. | [Data Scientist] Explain a dataset's patterns in plain language, write data-cleaning scripts, or get statistical analysis interpreted for non-technical stakeholders."},{"name":"GPT-4o","maker":"OpenAI","section":"OpenAI","description":"Fast multimodal model — vision + audio","tags":"frontier|multi","hot":"false","summary":"GPT-4o is OpenAI's fast, all-purpose AI model that handles text, images, and voice in real time. You can show it a photo, diagram, or document and ask questions about it — or just use it as a quick, responsive text assistant for everyday tasks.","bestFor":"[Technical Writer] Paste in a dense technical spec and ask it to rewrite it as clear documentation for different audiences. | [Sales Engineer] Upload a competitor's product sheet and get a quick comparison against NVIDIA's offerings. | [Designer] Describe a UI layout or upload a screenshot and get feedback or alternative design suggestions. | [Support Engineer] Describe an error message or system behavior and get a plain-language explanation plus likely fixes."},{"name":"o3 / o4-mini","maker":"OpenAI","section":"OpenAI","description":"Reasoning specialists — competition-level math & code","tags":"frontier|reason","hot":"false","summary":"o3 and o4-mini are OpenAI's reasoning-focused models that 'think' through hard problems before answering — similar to how a person works through a math problem on paper before writing the answer. They excel at multi-step logic, advanced mathematics, and complex coding challenges that trip up faster models.","bestFor":"[GPU Architect] Work through complex performance trade-off calculations across memory bandwidth, compute density, and power envelope scenarios. | [AI Researcher] Solve multi-step mathematical proofs, verify derivations, or debug training instability root causes. | [Software Developer] Tackle algorithmic challenges, optimize recursive functions, or reason through subtle concurrency bugs in CUDA kernels. | [Data Scientist] Build and verify multi-step statistical models or reason through causal inference problems with many variables."},{"name":"GPT Image 2","maker":"OpenAI","section":"OpenAI","description":"Successor to DALL-E brand — natively multimodal image gen","tags":"image","hot":"false","summary":"GPT Image 2 is OpenAI's image generation tool — you describe what you want in words and it creates a photorealistic or stylized image. It can also edit existing images, remove backgrounds, or add elements by following text instructions.","bestFor":"[Designer] Rapidly prototype marketing visuals, product mockups, or presentation graphics without needing photo shoots or stock licenses. | [Technical Writer] Generate custom diagrams, hardware illustrations, or conceptual graphics to accompany documentation. | [Product Manager] Create visual mockups of new product concepts or feature ideas to communicate with stakeholders. | [Sales Engineer] Generate polished visuals for customer presentations or demo environments on demand."},{"name":"Sora / Sora 2","maker":"OpenAI","section":"OpenAI","description":"Text-to-video generation — cinematic & stylized content","tags":"video","hot":"false","summary":"Sora is OpenAI's video generation tool — you type a description and it creates a short video clip from scratch, no cameras or editing software needed. Sora 2 produces longer, higher-quality clips with more realistic motion and scene consistency.","bestFor":"[Marketing] Create product demo videos, explainer animations, or promotional clips from a script without a film crew. | [Technical Writer] Generate short visual walkthroughs or conceptual animations to accompany product documentation. | [Designer] Prototype motion graphics, transitions, or visual effects for presentations and campaigns. | [Product Manager] Produce quick video mockups of new product concepts to communicate ideas to engineering and leadership."},{"name":"Whisper","maker":"OpenAI","section":"OpenAI","description":"Open-source speech recognition — 99-language support","tags":"audio|open","hot":"false","summary":"Whisper is a free, open-source tool from OpenAI that converts spoken audio into written text with high accuracy across 99 languages. You give it an audio or video file — a meeting recording, interview, or lecture — and it outputs a transcript automatically.","bestFor":"[AI Researcher] Transcribe hours of recorded interviews, conference talks, or internal presentations into searchable text. | [Technical Writer] Convert recorded product demos or engineering walkthroughs into written documentation automatically. | [Product Manager] Transcribe customer interviews or user research sessions for analysis without manual note-taking. | [Software Developer] Integrate speech-to-text into NVIDIA tools or internal applications using the free open-source model."},{"name":"Codex","maker":"OpenAI","section":"OpenAI","description":"Code generation model powering GitHub Copilot","tags":"code","hot":"false","summary":"Codex is OpenAI's code-focused AI model that can read, write, explain, and fix code across dozens of programming languages. It powers GitHub Copilot and works by understanding the intent behind what you're trying to build and translating it into working code.","bestFor":"[Software Developer] Auto-complete functions, generate boilerplate, and get real-time suggestions while writing CUDA, Python, or C++ code. | [AI Researcher] Quickly prototype model training scripts or data pipeline code without switching focus from research thinking. | [DevOps Engineer] Generate infrastructure-as-code scripts, CI/CD pipeline configs, or deployment automation from plain English descriptions. | [Data Scientist] Write data transformation and analysis scripts faster by describing the transformation in plain English."},{"name":"Claude Opus 4.8 / 4.7 / 4.6","maker":"Anthropic","section":"Anthropic","description":"Frontier reasoning + agentic models — 200K context","tags":"frontier|multi|reason","hot":"true","summary":"Claude Opus is Anthropic's most powerful AI assistant — designed for complex, long, and nuanced tasks that require careful reasoning. It can read and reason over very long documents (up to 200,000 words at once), write in depth, and handle multi-step agentic tasks where it takes actions on your behalf.","bestFor":"[AI Researcher] Feed it an entire research paper or patent filing and ask it to extract key claims, identify weaknesses, or compare against prior work. | [Legal / Compliance] Analyze lengthy contracts, regulatory filings, or technical standards documents and summarize obligations or risks. | [Software Developer] Use it as an autonomous coding agent that can plan, write, test, and debug a multi-file feature end to end. | [Product Manager] Draft comprehensive product strategy documents, roadmaps, or business cases from rough notes."},{"name":"Claude Sonnet 4.6","maker":"Anthropic","section":"Anthropic","description":"Balanced performance flagship","tags":"frontier|multi","hot":"false","summary":"Claude Sonnet is Anthropic's balanced AI assistant — it delivers high-quality responses across writing, analysis, and coding tasks at a faster speed than the flagship Opus model. It's the go-to choice for everyday professional tasks where you need reliable, thoughtful output without waiting.","bestFor":"[Technical Writer] Draft, edit, and polish technical documentation, release notes, or API reference pages quickly. | [Software Developer] Get clear code explanations, bug fixes, and code review feedback in real time during development. | [Product Manager] Turn meeting notes or raw feedback into structured summaries, action items, and decision documents. | [Data Scientist] Explain data findings in plain language, generate visualization code, or interpret model outputs for stakeholders."},{"name":"Claude Haiku 4.5","maker":"Anthropic","section":"Anthropic","description":"Fast & cost-efficient multimodal","tags":"frontier|multi","hot":"false","summary":"Claude Haiku is Anthropic's fastest and most lightweight model — built for tasks where speed matters more than depth, like quick answers, short summaries, or high-volume processing. It costs less to run and responds in a fraction of a second, making it ideal for embedding in tools and workflows.","bestFor":"[Software Developer] Build it into NVIDIA internal tools to provide instant AI-powered help, suggestions, or auto-fill features. | [Data Scientist] Process large batches of text records — classify, label, or summarize thousands of rows automatically. | [Technical Writer] Quickly generate first-draft summaries of short documents or changelog entries for review. | [Product Manager] Get rapid answers to quick factual questions or short drafts for emails and Slack messages."},{"name":"Claude Mythos Preview","maker":"Anthropic","section":"Anthropic","description":"Restricted frontier model — Project Glasswing only","tags":"frontier|reason","hot":"false","summary":"Claude Mythos is Anthropic's most advanced frontier model, currently available only to a small number of trusted organizations through Project Glasswing. It represents the cutting edge of AI reasoning and capability, intended for research into highly complex and sensitive use cases.","bestFor":"[AI Researcher] Explore frontier AI capabilities for breakthrough research problems requiring the most advanced reasoning available. | [Security Researcher] Analyze complex threat models, vulnerability chains, or adversarial scenarios requiring deep multi-step reasoning. | [Product Strategy] Model long-horizon strategic scenarios and competitive landscapes at a level of depth not possible with other models. | [R&D] Tackle the hardest unsolved technical problems in AI, hardware, or systems design with the most capable model available."},{"name":"Claude Code","maker":"Anthropic","section":"Anthropic","description":"Agentic CLI for software engineering","tags":"code|agent","hot":"false","summary":"Claude Code is an AI coding assistant that runs in your terminal — you give it a task in plain English and it reads your codebase, writes and edits files, runs tests, and fixes errors autonomously. It's like having a junior developer who works inside your existing tools without needing a separate app.","bestFor":"[Software Developer] Hand off a well-defined coding task — 'add pagination to this API endpoint' — and let it implement, test, and commit the change. | [DevOps Engineer] Automate repetitive infrastructure tasks like updating config files, writing deployment scripts, or refactoring build pipelines. | [AI Researcher] Quickly scaffold experiment code, data loaders, or evaluation harnesses without breaking focus from the research problem. | [Data Scientist] Clean datasets, generate analysis scripts, or build pipelines by describing the goal in plain language from the command line."},{"name":"Gemini 3.1 Pro Preview","maker":"Google DeepMind","section":"Google DeepMind","description":"Latest Gemini frontier — multimodal + reasoning","tags":"frontier|multi|reason","hot":"true","summary":"Gemini 3.1 Pro is Google's latest and most capable AI model — it handles text, images, video, audio, and code all in the same conversation. With a context window of up to 1 million tokens, it can process an entire codebase, long research papers, or hours of meeting transcripts at once.","bestFor":"[AI Researcher] Upload an entire dataset description, model architecture, and related papers in one prompt and ask for experimental design suggestions. | [Software Developer] Feed it a large codebase and ask architectural questions, find security issues, or plan a refactor across many files at once. | [Product Manager] Drop in a full year of customer feedback, meeting notes, and roadmap documents and ask for a synthesized strategic summary. | [Technical Writer] Process hours of recorded demos or lengthy internal wikis into clean, structured documentation automatically."},{"name":"Gemini 3 Pro / Flash","maker":"Google DeepMind","section":"Google DeepMind","description":"Production Gemini models — 1M token context","tags":"frontier|multi","hot":"false","summary":"Gemini 3 Pro and Flash are Google's production-ready AI models — Pro for quality-critical tasks, Flash for speed-critical ones. Both understand text, images, and code and run reliably at scale through Google's API for building AI-powered applications.","bestFor":"[Software Developer] Build AI features into NVIDIA internal tools using Google's managed API — chat, search, summarization, or code assistance. | [Data Scientist] Run large-scale text classification, entity extraction, or document summarization jobs through the API. | [Product Manager] Use Flash for instant AI-powered Q&A in internal productivity tools or knowledge bases. | [AI Researcher] Compare Gemini's outputs against other frontier models as part of model evaluation and benchmarking workflows."},{"name":"Gemini 2.5 Pro / Flash","maker":"Google DeepMind","section":"Google DeepMind","description":"Best coding + reasoning among Gemini 2.x","tags":"frontier|multi|reason","hot":"false","summary":"Gemini 2.5 Pro and Flash are Google's previous generation flagship models — widely used and well-documented, with strong coding, reasoning, and multimodal capabilities. Flash is optimized for high-volume, low-latency tasks while Pro handles more complex reasoning.","bestFor":"[Software Developer] Use Flash as a fast autocomplete and code review assistant embedded in development workflows. | [Data Scientist] Process large volumes of structured or unstructured data through the API for classification or extraction tasks. | [Technical Writer] Generate consistent first drafts of documentation from structured notes or code comments at scale. | [Product Manager] Rapidly analyze large collections of support tickets, reviews, or survey responses for themes and patterns."},{"name":"Gemma 4 / Gemma 3","maker":"Google DeepMind","section":"Google DeepMind","description":"Open multimodal models 1B–27B — Apache 2.0","tags":"open|multi|edge","hot":"false","summary":"Gemma is Google's family of open-source AI models that anyone can download, customize, and run on their own hardware — no cloud subscription needed. Sizes range from 1 billion to 27 billion parameters, and the models can understand both text and images.","bestFor":"[AI Researcher] Fine-tune Gemma on NVIDIA-specific datasets to build specialized internal models for chip design, benchmarking, or documentation. | [Software Developer] Run the model locally on NVIDIA GPUs for privacy-sensitive tasks where data cannot leave the company network. | [Data Scientist] Use as a base model for domain-specific fine-tuning experiments without paying per-token API fees. | [DevOps Engineer] Deploy on-premise in air-gapped environments where external API access is restricted."},{"name":"Imagen 3","maker":"Google DeepMind","section":"Google DeepMind","description":"High-quality photorealistic image generation","tags":"image","hot":"false","summary":"Imagen 3 is Google's photorealistic image generation model — you describe what you want in words and it produces high-quality images with accurate details, realistic lighting, and precise text rendering. It's accessible through Google's API and built into several Google products.","bestFor":"[Designer] Generate custom product imagery, marketing visuals, or presentation graphics from text descriptions without a photography budget. | [Technical Writer] Create accurate diagrams, hardware visualizations, or conceptual illustrations for documentation and training materials. | [Marketing] Produce on-brand promotional images for campaigns, social media, or sales materials on demand. | [Product Manager] Quickly visualize new product concepts or UI mockups to communicate ideas before design resources are available."},{"name":"Veo 3 / Veo 3.1","maker":"Google DeepMind","section":"Google DeepMind","description":"High-gloss realistic video generation","tags":"video","hot":"false","summary":"Veo is Google's AI video generation model — type a description and it produces realistic, high-quality video clips with accurate physics, lighting, and motion. Veo 3.1 adds enhanced realism and better handling of complex scenes with multiple subjects and camera movements.","bestFor":"[Marketing] Create product demo videos, event teasers, or explainer clips from a script without filming or editing equipment. | [Designer] Prototype motion graphics, animated transitions, or visual effects for presentations and campaigns. | [Technical Writer] Generate short animated walkthroughs of hardware features or software workflows for training content. | [Product Manager] Produce quick video concepts for new product pitches or roadmap presentations without engaging a production team."},{"name":"Lyria","maker":"Google DeepMind","section":"Google DeepMind","description":"AI music generation from Google","tags":"audio","hot":"false","summary":"Lyria is Google's AI music generation model — you describe the mood, style, or instrumentation you want and it composes original music. It can create background tracks, sound effects, or full compositions in a variety of genres.","bestFor":"[Marketing] Generate custom background music for product videos, event content, or promotional materials without licensing fees. | [Designer] Create branded sonic identity elements or UI sound effects for NVIDIA products and demos. | [Technical Writer] Produce ambient background tracks for training videos or product walkthroughs. | [Product Manager] Quickly add a professional audio layer to presentation videos or internal communications."},{"name":"Genie 3","maker":"Google DeepMind","section":"Google DeepMind","description":"Real-time interactive world model — 24fps 3D environments","tags":"world","hot":"true","summary":"Genie 3 is a Google DeepMind research model that can generate interactive 3D environments from a text description or image — like a real-time game world that you can navigate. It runs at 24 frames per second and represents a breakthrough in AI that understands and simulates physical spaces.","bestFor":"[AI Researcher] Study how world models can simulate environments for reinforcement learning and robotics research. | [R&D Engineer] Explore applications of generative world models for synthetic training data creation for autonomous systems. | [Product Strategy] Understand how interactive AI environments might shape future applications in simulation, gaming, or digital twins. | [AI Researcher] Benchmark NVIDIA hardware's ability to run real-time generative world models at scale."},{"name":"NotebookLM","maker":"Google Labs","section":"Google DeepMind","description":"RAG research tool — Audio/Video Overviews — 70M+ users","tags":"ent|meet","hot":"false","summary":"NotebookLM is a Google tool where you upload your own documents — PDFs, research papers, meeting notes, slide decks — and then have an AI conversation with that content. It answers questions, generates summaries, creates audio overviews (l chnology is being integrated into Wix's platform.","bestFor":"[Product Manager] Understand conversational app generation as an emerging pattern for no-code development now within Wix's ecosystem. | [Software Developer] Track how Wix integrates Base44's conversational AI into their platform as a reference for AI-assisted development product design. | [Sales Engineer] Note as an example of AI app building tools being acquired by established platforms — relevant to NVIDIA's partner ecosystem strategy. | [AI Researcher] Study conversational app generation as an AI application domain combining NLU, code generation, and UI assembly."},{"name":"Graphite (→ Cursor)","maker":"Graphite","section":"Acquisitions & Pivots","description":"Code review tool — now powers Cursor BugBot","tags":"acq|code","hot":"false","summary":"Graphite was a code review and developer workflow tool that Cursor acquired in December 2025. The technology now powers Cursor's BugBot feature — AI-powered automated code review that Cursor users can activate on their pull requests.","bestFor":"[Software Developer] Use Cursor BugBot (powered by Graphite's technology) for automated code review on every pull request. | [Product Manager] Understand how Cursor is building a complete developer toolchain through strategic acquisitions beyond just the IDE. | [AI Researcher] Study how code review AI capabilities are being integrated into the emerging AI-native developer tool ecosystem. | [DevOps Engineer] Enable automated bug detection on pull requests through Cursor BugBot as part of NVIDIA's CI/CD quality gates."},{"name":"Tome (deprecated)","maker":"Tome","section":"Acquisitions & Pivots","description":"AI presentation startup pivoted to sales — deck product sunset March 2025","tags":"acq","hot":"false","summary":"Tome was an AI presentation tool that gained significant early traction — it generated presentations from text prompts with a distinctive visual style. The product was sunset in March 2025 as the company pivoted to sales automation software, targeting AI-powered sales tools as a more defensible market.","bestFor":"[Product Manager] Study Tome as a case study in AI product market pivots — when early viral growth doesn't translate to sustainable product-market fit. | [AI Researcher] Analyze the competitive dynamics of AI presentation tools that led Tome to exit the market. | [Sales Engineer] Note Tome's pivot to sales automation as a signal for which AI application categories show stronger retention. | [Marketing] Understand the crowded AI content generation market through Tome's experience as competitive context."}];

const FILTERS = [
  { label:"All",           fn:()=>true },
  { label:"Frontier",      fn:t=>t.includes("frontier") },
  { label:"Open-weight",   fn:t=>t.includes("open") },
  { label:"Reasoning",     fn:t=>t.includes("reason") },
  { label:"Image",         fn:t=>t.includes("image") },
  { label:"Video",         fn:t=>t.includes("video") },
  { label:"Audio",         fn:t=>t.includes("audio") },
  { label:"Code & dev",    fn:t=>t.includes("code") },
  { label:"No-code",       fn:t=>t.includes("nc") },
  { label:"Agents",        fn:t=>t.includes("agent")||t.includes("auto") },
  { label:"Enterprise",    fn:t=>t.includes("ent") },
  { label:"Inference",     fn:t=>t.includes("inf") },
  { label:"Data / MLOps",  fn:t=>t.includes("data") },
  { label:"On-device",     fn:t=>t.includes("edge") },
  { label:"World models",  fn:t=>t.includes("world") },
  { label:"New arch",      fn:t=>t.includes("arch") },
  { label:"Sovereign",     fn:t=>t.includes("sov") },
  { label:"Hardware",      fn:t=>t.includes("hw") },
  { label:"Meeting AI",    fn:t=>t.includes("meet") },
  { label:"Hot",           fn:(t,hot)=>hot==="true" },
];

const TAG_LABEL = {
  frontier:"frontier",open:"open",image:"image",video:"video",
  audio:"audio",code:"code",multi:"multimodal",reason:"reasoning",
  agent:"agentic",ent:"enterprise",inf:"inference",data:"data",
  edge:"on-device",world:"world model",arch:"new arch",sov:"sovereign",
  auto:"automation",mkt:"marketing",nc:"no-code",meet:"meeting AI",
  hw:"hardware",acq:"acquired",agg:"aggregator"
};

let activeFilter = 0;

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderExpand(row) {
  const bullets = (row.bestFor||"").split(" | ").filter(Boolean).map(b => {
    // Bold the [Role] prefix
    const m = b.match(/^(\[.*?\])\s*(.*)/);
    if (m) return `<li><strong>${esc(m[1])}</strong> ${esc(m[2])}</li>`;
    return `<li>${esc(b)}</li>`;
  }).join("");
  return `
    <div class="nvidia-badge"><span class="nvidia-badge-dot"></span>NVIDIA use cases</div>
    <div class="expand-label">Summary</div>
    <div class="expand-summary">${esc(row.summary)}</div>
    <div class="expand-label">Best for NVIDIA employees</div>
    <div class="expand-bestfor"><ul>${bullets}</ul></div>`;
}

function toggleCard(cardEl, row) {
  const isExpanded = cardEl.classList.contains("expanded");
  document.querySelectorAll(".card.expanded").forEach(c => c.classList.remove("expanded"));
  if (!isExpanded) {
    cardEl.classList.add("expanded");
    const expandEl = cardEl.querySelector(".card-expand");
    if (!expandEl.dataset.filled) {
      expandEl.innerHTML = renderExpand(row);
      expandEl.dataset.filled = "1";
    }
  }
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const { fn: filterFn } = FILTERS[activeFilter];
  const grouped = {};
  let total = 0;

  DATA.forEach(row => {
    const tags = (row.tags||"").split("|").map(t=>t.trim()).filter(Boolean);
    if (!filterFn(tags, row.hot)) return;
    if (q && ![row.name, row.maker, row.description].some(s=>(s||"").toLowerCase().includes(q))) return;
    const sec = row.section || "Other";
    if (!grouped[sec]) grouped[sec] = [];
    grouped[sec].push({ ...row, tags });
    total++;
  });

  const main = document.getElementById("main");

  if (total === 0) {
    main.innerHTML = `<div class="empty">No results for "${esc(q)}"</div>`;
    document.getElementById("stats").innerHTML = `<span>0 entries</span>`;
    return;
  }

  main.innerHTML = Object.keys(grouped).map(sec => {
    const cards = grouped[sec].map(row => {
      const tagHtml = row.tags.slice(0,3).map(t =>
        `<span class="tag tag-${t}">${TAG_LABEL[t]||t}</span>`
      ).join("");
      return `<div class="card${row.hot==="true"?" hot":""}" data-name="${esc(row.name)}">
        <div class="card-header">
          <div>
            <div class="card-name">${esc(row.name)}</div>
            <div class="card-maker">${esc(row.maker)}</div>
          </div>
          <span class="chevron">▾</span>
        </div>
        <div class="card-desc">${esc(row.description)}</div>
        <div class="card-tags">${tagHtml}</div>
        <div class="card-expand"></div>
      </div>`;
    }).join("");
    return `<div class="section">
      <div class="section-title">${esc(sec)}</div>
      <div class="grid">${cards}</div>
    </div>`;
  }).join("");

  // Attach click handlers
  main.querySelectorAll(".card").forEach(cardEl => {
    const name = cardEl.dataset.name;
    const row = DATA.find(r => r.name === name);
    if (row) {
      const tags = (row.tags||"").split("|").map(t=>t.trim()).filter(Boolean);
      cardEl.addEventListener("click", () => toggleCard(cardEl, { ...row, tags }));
    }
  });

  const secs = Object.keys(grouped).length;
  document.getElementById("stats").innerHTML =
    `<span>${total} entries</span><span>${secs} sections</span><span><span class="hot-dot"></span>blue border = notable</span>`;
}

function buildFilters() {
  const el = document.getElementById("filters");
  FILTERS.forEach((f,i) => {
    const b = document.createElement("button");
    b.className = "filter-btn" + (i===0?" active":"");
    b.textContent = f.label;
    b.onclick = () => {
      activeFilter = i;
      document.querySelectorAll(".filter-btn").forEach((x,j) => x.classList.toggle("active", j===i));
      render();
    };
    el.appendChild(b);
  });
}

buildFilters();
render();
</script>
</body>
</html>
